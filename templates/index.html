<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VidSnap — Download Videos & Text to Audio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060810;
      --surface: #0d1117;
      --card: #111827;
      --border: rgba(255,255,255,0.07);
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --accent3: #f59e0b;
      --text: #f1f5f9;
      --muted: #64748b;
      --success: #10b981;
      --error: #ef4444;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.18;
    }
    .orb1 { width: 600px; height: 600px; background: var(--accent2); top: -200px; right: -200px; animation: drift1 12s ease-in-out infinite alternate; }
    .orb2 { width: 500px; height: 500px; background: var(--accent); bottom: -100px; left: -200px; animation: drift2 15s ease-in-out infinite alternate; }

    @keyframes drift1 { to { transform: translate(-60px, 80px); } }
    @keyframes drift2 { to { transform: translate(80px, -60px); } }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 0;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo span { color: var(--accent3); -webkit-text-fill-color: var(--accent3); }

    .badge {
      font-size: 0.7rem;
      font-weight: 500;
      background: rgba(0,229,255,0.1);
      border: 1px solid rgba(0,229,255,0.25);
      color: var(--accent);
      padding: 4px 12px;
      border-radius: 99px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 60px 0 36px;
    }

    .hero-eyebrow {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--accent);
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2.2rem, 5.5vw, 3.6rem);
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin-bottom: 18px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.35s;
    }

    .hero h1 em {
      font-style: normal;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      color: var(--muted);
      font-size: 1rem;
      max-width: 500px;
      margin: 0 auto 36px;
      line-height: 1.7;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.5s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Platform logos */
    .platforms {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.65s;
    }

    .platform-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 13px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      transition: all 0.2s;
    }

    .platform-chip:hover {
      border-color: rgba(255,255,255,0.18);
      color: var(--text);
      transform: translateY(-2px);
    }

    .platform-chip svg { width: 15px; height: 15px; flex-shrink: 0; }

    .more-sites {
      text-align: center;
      margin-top: 12px;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .more-sites a { color: var(--accent); text-decoration: none; }

    /* Main tabs */
    .main-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 5px;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.75s;
    }

    .main-tab {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .main-tab.active {
      background: var(--card);
      color: var(--text);
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .main-tab:hover:not(.active) { color: var(--text); }

    /* Tab panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.85s;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
      opacity: 0.5;
    }

    .tts-card::before {
      background: linear-gradient(90deg, transparent, var(--accent3), var(--accent2), transparent);
    }

    .input-label {
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* Video downloader inputs */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    .url-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .url-input::placeholder { color: var(--muted); }
    .url-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,0.08); }

    .fetch-btn {
      background: linear-gradient(135deg, var(--accent), #00b8d4);
      border: none;
      border-radius: 12px;
      padding: 13px 22px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      color: #000;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .fetch-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,229,255,0.3); }
    .fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Format grid */
    .format-section { margin-bottom: 18px; }

    .format-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    @media (max-width: 500px) {
      .format-grid { grid-template-columns: repeat(2, 1fr); }
      .input-row { flex-direction: column; }
    }

    .format-option { display: none; }

    .format-label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 13px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.83rem;
      font-weight: 500;
    }

    .format-label:hover { border-color: rgba(255,255,255,0.2); }
    .format-option:checked + .format-label { border-color: var(--accent); background: rgba(0,229,255,0.07); color: var(--accent); }

    .format-icon { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 0.9rem; flex-shrink: 0; }
    .fi-video { background: rgba(0,229,255,0.1); }
    .fi-sd { background: rgba(124,58,237,0.1); }
    .fi-3gp { background: rgba(245,158,11,0.1); }
    .fi-mp3 { background: rgba(16,185,129,0.1); }
    .fi-m4a { background: rgba(239,68,68,0.1); }
    .fi-webm { background: rgba(99,102,241,0.1); }

    /* Preview */
    .preview-box {
      display: none;
      gap: 14px;
      padding: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 18px;
      animation: fadeUp 0.3s ease;
    }

    .preview-box.visible { display: flex; align-items: center; }

    .preview-thumb {
      width: 90px; height: 60px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
      background: var(--bg);
    }

    .preview-info { flex: 1; min-width: 0; }

    .preview-title {
      font-weight: 600;
      font-size: 0.88rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .preview-meta { font-size: 0.75rem; color: var(--muted); }

    .preview-platform {
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 99px;
      background: rgba(0,229,255,0.1);
      color: var(--accent);
      border: 1px solid rgba(0,229,255,0.2);
      margin-top: 5px;
      display: inline-block;
    }

    /* Download / Convert buttons */
    .action-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .btn-download {
      background: linear-gradient(135deg, var(--accent2), #9333ea);
      color: #fff;
    }

    .btn-download:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(124,58,237,0.4); }
    .btn-download:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-tts {
      background: linear-gradient(135deg, var(--accent3), #f97316);
      color: #000;
    }

    .btn-tts:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(245,158,11,0.4); }
    .btn-tts:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Progress */
    .progress-wrap { display: none; margin-top: 14px; }
    .progress-wrap.visible { display: block; }

    .progress-bar-track {
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
    }

    .progress-bar-fill.indeterminate {
      width: 40%;
      animation: slide 1.2s ease-in-out infinite;
    }

    .progress-bar-fill.tts-bar {
      background: linear-gradient(90deg, var(--accent3), #f97316);
    }

    @keyframes slide {
      0% { transform: translateX(-150%); }
      100% { transform: translateX(350%); }
    }

    .progress-text { font-size: 0.78rem; color: var(--muted); text-align: center; }

    /* Status */
    .status-msg {
      display: none;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 0.83rem;
      margin-top: 12px;
      animation: fadeUp 0.3s ease;
    }

    .status-msg.error { display: flex; gap: 8px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }
    .status-msg.success { display: flex; gap: 8px; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); color: #6ee7b7; }

    /* TTS specific */
    .tts-textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      color: var(--text);
      outline: none;
      resize: vertical;
      min-height: 160px;
      line-height: 1.6;
      transition: border-color 0.2s;
      margin-bottom: 8px;
    }

    .tts-textarea::placeholder { color: var(--muted); }
    .tts-textarea:focus { border-color: var(--accent3); box-shadow: 0 0 0 3px rgba(245,158,11,0.08); }
    .tts-textarea.overlimit { border-color: var(--error); box-shadow: 0 0 0 3px rgba(239,68,68,0.08); }

    .char-counter-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .char-counter {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      transition: color 0.2s;
    }

    .char-counter.warn { color: var(--accent3); }
    .char-counter.over { color: var(--error); font-weight: 700; }

    .char-bar-track {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      margin: 0 14px;
    }

    .char-bar-fill {
      height: 100%;
      background: var(--success);
      border-radius: 99px;
      transition: width 0.2s, background 0.2s;
    }

    /* TTS options row */
    .tts-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    @media (max-width: 480px) { .tts-options { grid-template-columns: 1fr; } }

    .tts-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
      width: 100%;
    }

    .tts-select:focus { border-color: var(--accent3); }
    .tts-select option { background: var(--card); }

    .select-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    /* Audio format toggle */
    .audio-fmt-row {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .audio-fmt-opt { display: none; }

    .audio-fmt-label {
      flex: 1;
      text-align: center;
      padding: 10px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--muted);
      transition: all 0.2s;
    }

    .audio-fmt-label:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
    .audio-fmt-opt:checked + .audio-fmt-label { border-color: var(--accent3); background: rgba(245,158,11,0.08); color: var(--accent3); }

    /* Stats */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 40px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 1s;
    }

    @media (max-width: 600px) { .stats-row { grid-template-columns: 1fr; } }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
      text-align: center;
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.9rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 5px;
    }

    .stat-label { font-size: 0.8rem; color: var(--muted); }

    footer {
      text-align: center;
      margin-top: 56px;
      font-size: 0.78rem;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 1.1s;
    }

    footer a { color: var(--accent); text-decoration: none; }

    .spinner {
      width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
