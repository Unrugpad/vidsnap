<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VidSnap — Download Videos & Text to Audio</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060810; --surface: #0d1117; --card: #111827;
      --border: rgba(255,255,255,0.07); --accent: #00e5ff;
      --accent2: #7c3aed; --accent3: #f59e0b;
      --text: #f1f5f9; --muted: #64748b;
      --success: #10b981; --error: #ef4444;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

    .wrapper { max-width: 860px; margin: 0 auto; padding: 0 16px 60px; }

    /* Nav */
    nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 12px; }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .logo span { -webkit-text-fill-color: var(--accent3); }
    .badge { font-size: 0.65rem; font-weight: 500; background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.25); color: var(--accent); padding: 3px 10px; border-radius: 99px; letter-spacing: 1px; text-transform: uppercase; }

    /* Hero - compact */
    .hero { text-align: center; padding: 10px 0 14px; }
    .hero h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(1.5rem, 6vw, 2.8rem); line-height: 1.15; letter-spacing: -1px; margin-bottom: 8px; }
    .hero h1 em { font-style: normal; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero p { color: var(--muted); font-size: 0.82rem; margin-bottom: 12px; line-height: 1.5; }

    /* Platform logos - auto scrolling marquee */
    .platforms-wrap { overflow: hidden; margin-bottom: 14px; -webkit-mask: linear-gradient(90deg, transparent, black 8%, black 92%, transparent); mask: linear-gradient(90deg, transparent, black 8%, black 92%, transparent); }
    .platforms { display: flex; gap: 7px; width: max-content; animation: marquee 20s linear infinite; }
    .platforms:hover { animation-play-state: paused; }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .platform-chip { display: flex; align-items: center; gap: 5px; padding: 5px 10px; background: var(--card); border: 1px solid var(--border); border-radius: 99px; font-size: 0.72rem; font-weight: 500; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
    .platform-chip svg { width: 13px; height: 13px; }

    /* Tabs */
    .main-tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 4px; margin-bottom: 14px; }
    .main-tab { flex: 1; padding: 10px; border: none; border-radius: 8px; background: transparent; color: var(--muted); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .main-tab.active { background: var(--card); color: var(--text); }

    /* Card */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; position: relative; overflow: hidden; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent); opacity: 0.5; }
    .tts-card::before { background: linear-gradient(90deg, transparent, var(--accent3), var(--accent2), transparent); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .input-label { font-size: 0.7rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 8px; display: block; }

    .input-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .url-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--text); outline: none; }
    .url-input::placeholder { color: var(--muted); }
    .url-input:focus { border-color: var(--accent); }

    .fetch-btn { background: linear-gradient(135deg, var(--accent), #00b8d4); border: none; border-radius: 10px; padding: 11px 16px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem; color: #000; cursor: pointer; white-space: nowrap; }
    .fetch-btn:disabled { opacity: 0.5; }

    /* Format grid */
    .format-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 14px; }
    .format-option { display: none; }
    .format-label { display: flex; align-items: center; gap: 7px; padding: 9px 10px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 500; }
    .format-option:checked + .format-label { border-color: var(--accent); background: rgba(0,229,255,0.07); color: var(--accent); }
    .fi { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 5px; font-size: 0.8rem; flex-shrink: 0; }
    .fi-video { background: rgba(0,229,255,0.1); }
    .fi-sd { background: rgba(124,58,237,0.1); }
    .fi-3gp { background: rgba(245,158,11,0.1); }
    .fi-mp3 { background: rgba(16,185,129,0.1); }
    .fi-m4a { background: rgba(239,68,68,0.1); }
    .fi-webm { background: rgba(99,102,241,0.1); }

    /* Preview */
    .preview-box { display: none; gap: 12px; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 14px; }
    .preview-box.visible { display: flex; align-items: center; }
    .preview-thumb { width: 80px; height: 54px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
    .preview-title { font-weight: 600; font-size: 0.82rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 3px; }
    .preview-meta { font-size: 0.7rem; color: var(--muted); }
    .preview-platform { font-size: 0.63rem; padding: 2px 7px; border-radius: 99px; background: rgba(0,229,255,0.1); color: var(--accent); border: 1px solid rgba(0,229,255,0.2); margin-top: 4px; display: inline-block; }

    /* Buttons */
    .action-btn { width: 100%; padding: 13px; border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
    .btn-download { background: linear-gradient(135deg, var(--accent2), #9333ea); color: #fff; }
    .btn-download:disabled { opacity: 0.5; }
    .btn-tts { background: linear-gradient(135deg, var(--accent3), #f97316); color: #000; }
    .btn-tts:disabled { opacity: 0.5; }

    /* Progress */
    .progress-wrap { display: none; margin-top: 12px; }
    .progress-wrap.visible { display: block; }
    .progress-bar-track { height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
    .progress-bar-fill { height: 100%; width: 40%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; animation: slide 1.2s ease-in-out infinite; }
    .progress-bar-fill.tts-bar { background: linear-gradient(90deg, var(--accent3), #f97316); }
    @keyframes slide { 0% { transform: translateX(-150%); } 100% { transform: translateX(350%); } }
    .progress-text { font-size: 0.72rem; color: var(--muted); text-align: center; }

    /* Status */
    .status-msg { display: none; padding: 10px 12px; border-radius: 8px; font-size: 0.78rem; margin-top: 10px; }
    .status-msg.error { display: flex; gap: 7px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }
    .status-msg.success { display: flex; gap: 7px; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); color: #6ee7b7; }

    /* TTS */
    .tts-textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 13px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--text); outline: none; resize: vertical; min-height: 130px; line-height: 1.5; margin-bottom: 6px; }
    .tts-textarea:focus { border-color: var(--accent3); }
    .tts-textarea.overlimit { border-color: var(--error); }
    .char-counter-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .char-counter { font-size: 0.72rem; font-weight: 500; color: var(--muted); }
    .char-counter.warn { color: var(--accent3); }
    .char-counter.over { color: var(--error); font-weight: 700; }
    .char-bar-track { flex: 1; height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; margin: 0 10px; }
    .char-bar-fill { height: 100%; background: var(--success); border-radius: 99px; transition: width 0.2s, background 0.2s; }
    .char-hint { font-size: 0.68rem; color: var(--muted); }
    .tts-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .select-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); margin-bottom: 5px; }
    .tts-select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: var(--text); outline: none; }
    .tts-select option { background: var(--card); }
    .audio-fmt-row { display: flex; gap: 6px; }
    .audio-fmt-opt { display: none; }
    .audio-fmt-label { flex: 1; text-align: center; padding: 9px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 0.78rem; font-weight: 600; color: var(--muted); }
    .audio-fmt-opt:checked + .audio-fmt-label { border-color: var(--accent3); background: rgba(245,158,11,0.08); color: var(--accent3); }

    /* Stats */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
    .stat-num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 3px; }
    .stat-label { font-size: 0.68rem; color: var(--muted); }

    footer { text-align: center; margin-top: 24px; font-size: 0.72rem; color: var(--muted); }
    footer a { color: var(--accent); text-decoration: none; }

    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.25); border-top-color: currentColor; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
